services:
  postgres:
    image: postgres:16-alpine
    container_name: notes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  backend:
    build:
      context: ./backend
    container_name: notes-backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - media_volume:/app/media
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/').read()\""]
      interval: 20s
      timeout: 5s
      retries: 5
    expose:
      - "8000"
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: notes-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http=require('http');http.get('http://localhost:4173',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1));\""]
      interval: 20s
      timeout: 5s
      retries: 5
    expose:
      - "4173"
    networks:
      - app_network

  nginx:
    build:
      context: ./nginx
    container_name: notes-nginx
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost/nginx-health >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
    ports:
      - "80:80"
    volumes:
      - media_volume:/usr/share/nginx/media
    networks:
      - app_network

volumes:
  postgres_data:
  media_volume:

networks:
  app_network:
    driver: bridge
